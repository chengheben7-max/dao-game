<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>到达小镇：动词+到 像素风RPG</title>
<style>
:root{
  --ink:#222;
  --paper:#fff8df;
  --panel:#f4e7b8;
  --green:#7ec46c;
  --road:#a28b68;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:#1f2430;
  color:var(--ink);
  font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;
}
#shell{
  max-width:1200px;
  margin:0 auto;
  padding:10px;
  display:grid;
  grid-template-columns:1fr 330px;
  gap:10px;
}
#game{
  border:5px solid #111;
  background:#000;
  image-rendering:pixelated;
  position:relative;
}
#bar{
  height:42px;
  background:#111;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 12px;
  font-weight:bold;
}
#world{
  position:relative;
  height:600px;
  overflow:hidden;
  background:
    linear-gradient(45deg, rgba(255,255,255,.08) 25%, transparent 25%) 0 0/32px 32px,
    linear-gradient(-45deg, rgba(255,255,255,.08) 25%, transparent 25%) 0 0/32px 32px,
    #78b85d;
}
.tile{
  position:absolute;
  border:4px solid #1b1b1b;
  box-shadow:inset -5px -5px rgba(0,0,0,.15);
  text-align:center;
  font-weight:bold;
  padding-top:10px;
}
#home{left:40px;top:55px;width:150px;height:110px;background:#ffd36e}
#school{left:380px;top:40px;width:180px;height:125px;background:#f2cf80}
#shop{right:50px;top:65px;width:175px;height:120px;background:#e88b81}
#park{left:55px;bottom:60px;width:235px;height:140px;background:#4ca865}
#station{right:70px;bottom:60px;width:230px;height:130px;background:#82b8f5}
.roadH{position:absolute;left:0;top:280px;width:100%;height:72px;background:var(--road);border-top:4px solid #806a4b;border-bottom:4px solid #806a4b}
.roadV{position:absolute;left:50%;top:0;width:76px;height:100%;background:var(--road);border-left:4px solid #806a4b;border-right:4px solid #806a4b}
.obj,.npc{
  position:absolute;
  width:48px;height:48px;
  background:#fff;
  border:4px solid #111;
  display:grid;
  place-items:center;
  font-size:26px;
  cursor:pointer;
  box-shadow:5px 5px 0 rgba(0,0,0,.3);
}
.obj:hover,.npc:hover{transform:translate(-2px,-2px)}
.name{
  position:absolute;
  top:50px;left:50%;transform:translateX(-50%);
  white-space:nowrap;
  font-size:12px;
  background:#fff8df;
  border:2px solid #111;
  padding:1px 4px;
}
#hero{
  position:absolute;
  left:275px;top:285px;
  width:42px;height:54px;
  border:4px solid #111;
  background:#ffe071;
  display:grid;
  place-items:center;
  font-size:26px;
  z-index:20;
  box-shadow:5px 5px 0 rgba(0,0,0,.25);
}
#hero:after{
  content:"你";
  position:absolute;
  top:56px;
  background:#fff8df;
  border:2px solid #111;
  font-size:12px;
  padding:0 5px;
}
#dialog{
  display:none;
  position:absolute;
  left:18px;right:18px;bottom:16px;
  background:var(--paper);
  border:5px solid #111;
  padding:14px;
  z-index:40;
  line-height:1.65;
  box-shadow:8px 8px 0 rgba(0,0,0,.35);
}
#dialog button{margin-top:8px}
#start{
  position:absolute;
  inset:42px 0 0 0;
  z-index:80;
  background:rgba(31,36,48,.94);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:30px;
}
#start .box{
  max-width:620px;
  background:#111;
  border:5px solid #fff;
  padding:24px;
  box-shadow:10px 10px 0 rgba(0,0,0,.45);
}
#start h1{font-size:34px;margin:0 0 10px}
#side{
  background:var(--paper);
  border:5px solid #111;
  padding:14px;
}
h2{font-size:18px;margin:12px 0 8px}
.card{
  background:#fff;
  border:4px solid #111;
  padding:10px;
  margin-bottom:10px;
  box-shadow:5px 5px 0 rgba(0,0,0,.2);
}
#quest{min-height:120px}
button{
  font-weight:bold;
  border:3px solid #111;
  background:#fff;
  padding:8px 10px;
  cursor:pointer;
  box-shadow:4px 4px 0 #111;
  margin:3px;
}
button:active{transform:translate(3px,3px);box-shadow:1px 1px 0 #111}
.ok{color:#11712a;font-weight:bold}
.bad{color:#a31919;font-weight:bold}
.muted{color:#666}
#bag span{
  display:inline-block;
  border:3px solid #111;
  background:#f6e7a8;
  padding:4px 7px;
  margin:3px;
}
#log{
  max-height:155px;
  overflow:auto;
  font-size:14px;
  line-height:1.5;
}
.meter{height:18px;border:3px solid #111;background:#fff;margin-top:6px}
#fill{height:100%;width:0%;background:#69b96a}
@media(max-width:900px){
  #shell{grid-template-columns:1fr}
  #world{height:560px}
}
</style>
</head>
<body>
<div id="shell">
  <main id="game">
    <div id="bar">
      <span>到达小镇：动词+到 RPG</span>
      <span>完成度 <span id="score">0</span>/8</span>
    </div>
    <section id="world">
      <div class="roadH"></div><div class="roadV"></div>
      <div id="home" class="tile">宿舍<br>收到</div>
      <div id="school" class="tile">学校<br>学到 / 见到</div>
      <div id="shop" class="tile">商店<br>买到</div>
      <div id="park" class="tile">公园<br>看到 / 找到</div>
      <div id="station" class="tile">车站<br>听到 / 跑到</div>

      <div id="teacher" class="npc" style="left:445px;top:98px">👩‍🏫<span class="name">老师</span></div>
      <div id="book" class="obj" style="left:360px;top:180px">📘<span class="name">课本</span></div>
      <div id="apple" class="obj" style="right:105px;top:125px">🍎<span class="name">苹果</span></div>
      <div id="cat" class="obj" style="left:190px;bottom:105px">🐱<span class="name">小猫</span></div>
      <div id="bird" class="obj" style="left:85px;bottom:210px">🐦<span class="name">小鸟</span></div>
      <div id="radio" class="obj" style="right:165px;bottom:105px">📻<span class="name">广播</span></div>
      <div id="train" class="obj" style="right:85px;bottom:200px">🚆<span class="name">车站</span></div>
      <div id="package" class="obj" style="left:110px;top:180px">📦<span class="name">包裹</span></div>

      <div id="hero">🙂</div>
      <div id="dialog"></div>

      <div id="start">
        <div class="box">
          <h1>到达小镇</h1>
          <p>你是刚到中国小镇的留学生。今天的目标是完成8个任务，理解“动词 + 到”的意义。</p>
          <p><b>核心规则：</b>动作有了结果，常说“动词 + 到”。例如：找 → 找到；看 → 看到；买 → 买到。</p>
          <button onclick="begin()">开始游戏</button>
        </div>
      </div>
    </section>
  </main>

  <aside id="side">
    <div class="card">
      <h2>当前任务</h2>
      <div id="quest"></div>
      <div class="meter"><div id="fill"></div></div>
    </div>
    <div class="card">
      <h2>移动</h2>
      <p class="muted">电脑用 WASD / 方向键；手机点按钮。靠近后点击目标。</p>
      <button onclick="step(0,-36)">上</button>
      <button onclick="step(-36,0)">左</button>
      <button onclick="step(36,0)">右</button>
      <button onclick="step(0,36)">下</button>
      <br><button onclick="reset()">重新开始</button>
    </div>
    <div class="card">
      <h2>背包</h2>
      <div id="bag"><span>空</span></div>
    </div>
    <div class="card">
      <h2>语法图鉴</h2>
      <div id="atlas" class="muted">完成任务后解锁。</div>
    </div>
    <div class="card">
      <h2>记录</h2>
      <div id="log"></div>
    </div>
  </aside>
</div>

<script>
const quests=[
 {id:"teacher", item:"见到老师", title:"1. 走到学校，见到老师。", sent:"我见到了老师。", type:"人/目标出现", explain:"“见”有结果，目标人物出现，所以说“见到”。"},
 {id:"book", item:"新词", title:"2. 点击课本，学一个新词。", sent:"我学到了一个新词。", type:"知识获得", explain:"学习之后获得知识，可以说“学到”。"},
 {id:"bird", item:"小鸟", title:"3. 去公园，看小鸟。", sent:"我看到了小鸟。", type:"感知结果", explain:"看的动作产生结果，视觉对象出现，所以说“看到”。"},
 {id:"cat", item:"小猫", title:"4. 在公园找到小猫。", sent:"我找到了小猫。", type:"结果实现", explain:"找的过程结束，目标出现，所以说“找到”。"},
 {id:"radio", item:"音乐", title:"5. 去车站，听广播。", sent:"我听到了音乐。", type:"听觉结果", explain:"听的结果出现，声音进入感知，所以说“听到”。"},
 {id:"train", item:"车站", title:"6. 跑到车站。", sent:"我跑到了车站。", type:"空间到达", explain:"移动动作到达终点，所以说“跑到”。"},
 {id:"apple", item:"苹果", title:"7. 去商店买苹果。", sent:"我买到了苹果。", type:"获得结果", explain:"买的目标成功获得，所以说“买到”。"},
 {id:"package", item:"包裹", title:"8. 回宿舍收包裹。", sent:"我收到了包裹。", type:"接受/获得", explain:"别人给你的东西进入你的手中，所以说“收到”。"}
];
let q=0, score=0, x=275, y=285, bag=[], atlas=[];
const hero=document.getElementById("hero"), keys={};

function begin(){document.getElementById("start").style.display="none"; log("欢迎来到小镇。先去学校见老师。")}
function render(){
 const box=document.getElementById("quest");
 if(q>=quests.length){
   box.innerHTML="<b>通关！</b><br>你完成了所有“动词+到”任务。<br><span class='ok'>总结句：我学到了“到”的结果意义。</span>";
 }else{
   box.innerHTML="<b>"+quests[q].title+"</b><br><br>目标：<b>"+quests[q].id+"</b><br><span class='muted'>靠近目标并点击。</span>";
 }
 document.getElementById("score").textContent=score;
 document.getElementById("fill").style.width=(score/quests.length*100)+"%";
 document.getElementById("bag").innerHTML=bag.length?bag.map(i=>"<span>"+i+"</span>").join(""):"<span>空</span>";
 document.getElementById("atlas").innerHTML=atlas.length?atlas.map(a=>"<div>📌 <b>"+a.type+"</b>： "+a.sent+"</div>").join(""):"完成任务后解锁。";
}
function step(dx,dy){
 x=Math.max(5,Math.min(document.getElementById("world").clientWidth-55,x+dx));
 y=Math.max(5,Math.min(540,y+dy));
 hero.style.left=x+"px";hero.style.top=y+"px";
}
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);
function loop(){
 let dx=0,dy=0,s=8;
 if(keys.a||keys.arrowleft)dx-=s;
 if(keys.d||keys.arrowright)dx+=s;
 if(keys.w||keys.arrowup)dy-=s;
 if(keys.s||keys.arrowdown)dy+=s;
 if(dx||dy)step(dx,dy);
 requestAnimationFrame(loop);
}
function dist(el){
 const r=el.getBoundingClientRect(), wr=document.getElementById("world").getBoundingClientRect();
 const cx=r.left-wr.left+r.width/2, cy=r.top-wr.top+r.height/2;
 return Math.hypot(cx-(x+21),cy-(y+27));
}
document.querySelectorAll(".obj,.npc").forEach(el=>{
 el.onclick=()=>act(el.id);
});
function act(id){
 if(q>=quests.length)return;
 const quest=quests[q], el=document.getElementById(id);
 if(dist(el)>95){ log("太远了，请先走近一点。","bad"); return; }
 if(id!==quest.id){ log("现在不是这个任务。当前任务是："+quest.title,"bad"); return; }
 score++; bag.push(quest.item); atlas.push({type:quest.type,sent:quest.sent});
 show(`<b class="ok">任务完成！</b><br>${quest.sent}<br><br>${quest.explain}<br><br><button onclick="next()">继续</button>`);
 log("✅ "+quest.sent+"｜"+quest.type,"ok");
 render();
}
function show(html){
 const d=document.getElementById("dialog");
 d.innerHTML=html; d.style.display="block";
}
function next(){
 document.getElementById("dialog").style.display="none";
 q++; render();
 if(q<quests.length) log("新任务："+quests[q].title);
}
function log(msg,cls=""){
 const l=document.getElementById("log");
 l.innerHTML="<div class='"+cls+"'>"+msg+"</div>"+l.innerHTML;
}
function reset(){
 q=0;score=0;x=275;y=285;bag=[];atlas=[];
 hero.style.left=x+"px";hero.style.top=y+"px";
 document.getElementById("dialog").style.display="none";
 document.getElementById("start").style.display="flex";
 document.getElementById("log").innerHTML="";
 render();
}
render();loop();
</script>
</body>
</html>
